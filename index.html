<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAST CALL</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-inner">
      <h1>LAST CALL</h1>
      <p class="tagline">The night is just beginning.</p>
      <a href="#info" class="btn">詳しく見る</a>
    </div>
  </section>

  <!-- ABOUT -->
  <section class="about" id="about">
    <div class="container">
      <h2>ABOUT</h2>
      <p>
        LAST CALL は、音楽・アート・カルチャーが交差する夜のイベントです。<br>
        最高の夜を、あなたと。
      </p>
    </div>
  </section>

  <!-- GALLERY -->
  <section class="gallery" id="gallery">
    <div class="container">
      <h2>GALLERY</h2>
      <div class="grid">
        <div class="grid-item"><img src="photos/1.jpg" alt="event photo" /></div>
        <div class="grid-item"><img src="photos/2.jpg" alt="event photo" /></div>
        <div class="grid-item"><img src="photos/3.jpg" alt="event photo" /></div>
        <div class="grid-item"><img src="photos/4.jpg" alt="event photo" /></div>
        <div class="grid-item"><img src="photos/5.jpg" alt="event photo" /></div>
        <div class="grid-item"><img src="photos/6.jpg" alt="event photo" /></div>
      </div>
    </div>
  </section>

  <!-- INFO -->
  <section class="info" id="info">
    <div class="container">
      <h2>INFO</h2>
      <table>
        <tr><th>NEXT EVENT</th><td>TBA</td></tr>
        <tr><th>VENUE</th><td>TBA</td></tr>
        <tr><th>OPEN</th><td>22:00</td></tr>
        <tr><th>ADV</th><td>¥2,000</td></tr>
        <tr><th>DOOR</th><td>¥2,500</td></tr>
      </table>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 LAST CALL. All rights reserved.</p>
  </footer>

</body>
</html>
