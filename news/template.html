<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- タイトルは記事ごとに変更してください -->
  <title>記事タイトル｜Last Call</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@400;600;700&family=Klee+One:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/news.css" />
</head>
<body class="news-page">

  <!-- ナビゲーション -->
  <header class="nav scrolled" id="nav">
    <div class="nav__inner">
      <a href="../index.html" class="nav__logo" style="color: var(--navy);">Last Call</a>
      <nav class="nav__menu" id="navMenu">
        <a href="../index.html#story"   class="nav__link" style="color: var(--navy);">STORY</a>
        <a href="../index.html#cast"    class="nav__link" style="color: var(--navy);">CAST</a>
        <a href="../index.html#staff"   class="nav__link" style="color: var(--navy);">STAFF</a>
        <a href="../index.html#gallery" class="nav__link" style="color: var(--navy);">GALLERY</a>
        <a href="../index.html#news"    class="nav__link" style="color: var(--navy);">NEWS</a>
      </nav>
    </div>
  </header>

  <!-- 記事 -->
  <main class="article-page">
    <div class="container">
      <article class="article">

        <!-- パンくずリスト -->
        <nav class="breadcrumb" aria-label="パンくず">
          <a href="../index.html">TOP</a>
          <span> &rsaquo; </span>
          <a href="index.html">NEWS</a>
          <span> &rsaquo; </span>
          <!-- 記事タイトルを記入してください -->
          <span aria-current="page">記事タイトル</span>
        </nav>

        <!-- 記事ヘッダー -->
        <header class="article__head">
          <!-- カテゴリタグ（INFO / REPORT / EVENT から選択） -->
          <span class="news__tag">INFO</span>
          <!-- 日付 datetime 属性は機械向け、テキストは人向け -->
          <time class="article__date" datetime="2026-04-26">2026.04.26</time>
          <!-- 記事タイトル -->
          <h1 class="article__title serif">公式サイトをオープンしました</h1>
        </header>

        <!-- アイキャッチ画像（任意）差し替え：assets/img/news/01.jpg -->
        <!--
        <figure class="article__eyecatch">
          <img src="../assets/img/news/01.jpg" alt="記事の画像" />
        </figure>
        -->

        <!-- 記事本文 -->
        <div class="article__body">
          <!-- ここに記事本文を書いてください。コピーしてテンプレとして使ってください。 -->
          <p>
            この度、自主制作短編映画「Last Call」の公式サイトをオープンいたしました。
            今後はこちらから最新情報をお届けしますので、ぜひブックマークをお願いします。
          </p>
          <p>
            公開は2026年夏を予定しています。続報をお楽しみに。
          </p>
          <!-- 画像を入れる場合の書き方 -->
          <!--
          <figure>
            <img src="../assets/img/news/01.jpg" alt="説明テキスト" />
            <figcaption>キャプションテキスト</figcaption>
          </figure>
          -->
        </div>

        <!-- 記事フッター：前後ナビ（任意） -->
        <footer class="article__foot">
          <a href="index.html" class="btn-outline">← 一覧に戻る</a>
        </footer>

      </article>
    </div>
  </main>

  <!-- フッター -->
  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__logo serif">Last Call</p>
      <p class="footer__copy">&copy;2026 YOLO / Last Call 製作委員会</p>
    </div>
  </footer>

</body>
</html>
