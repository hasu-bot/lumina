<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お知らせ一覧｜Last Call</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@400;600;700&family=Klee+One:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/news.css" />
</head>
<body class="news-page">

  <!-- ナビゲーション -->
  <header class="nav scrolled" id="nav">
    <div class="nav__inner">
      <a href="../index.html" class="nav__logo" style="color: var(--navy);">Last Call</a>
      <nav class="nav__menu" id="navMenu">
        <a href="../index.html#story"   class="nav__link" style="color: var(--navy);">STORY</a>
        <a href="../index.html#cast"    class="nav__link" style="color: var(--navy);">CAST</a>
        <a href="../index.html#staff"   class="nav__link" style="color: var(--navy);">STAFF</a>
        <a href="../index.html#gallery" class="nav__link" style="color: var(--navy);">GALLERY</a>
        <a href="../index.html#news"    class="nav__link" style="color: var(--navy);">NEWS</a>
      </nav>
    </div>
  </header>

  <!-- ページヘッダー -->
  <div class="page-hero">
    <div class="page-hero__inner">
      <span class="section__en">NEWS</span>
      <h1 class="section__ja serif">お知らせ一覧</h1>
    </div>
  </div>

  <!-- お知らせ一覧 -->
  <main class="news-list-page">
    <div class="container">
      <!-- カテゴリフィルター -->
      <div class="news-filter">
        <button class="news-filter__btn active" data-filter="all">すべて</button>
        <button class="news-filter__btn" data-filter="INFO">INFO</button>
        <button class="news-filter__btn" data-filter="REPORT">REPORT</button>
        <button class="news-filter__btn" data-filter="EVENT">EVENT</button>
      </div>

      <ul class="news__list">
        <!-- 記事はここに追加。data-category でフィルター対応 -->
        <li class="news__item" data-category="INFO">
          <a href="template.html" class="news__link">
            <time class="news__date" datetime="2026-04-26">2026.04.26</time>
            <span class="news__tag">INFO</span>
            <span class="news__title">公式サイトをオープンしました</span>
          </a>
        </li>
        <li class="news__item" data-category="INFO">
          <a href="template.html" class="news__link">
            <time class="news__date" datetime="2026-04-01">2026.04.01</time>
            <span class="news__tag">INFO</span>
            <span class="news__title">クランクアップのお知らせ</span>
          </a>
        </li>
        <li class="news__item" data-category="REPORT">
          <a href="template.html" class="news__link">
            <time class="news__date" datetime="2026-03-15">2026.03.15</time>
            <span class="news__tag">REPORT</span>
            <span class="news__title">天草・御所浦でのロケ撮影が始まりました</span>
          </a>
        </li>
        <li class="news__item" data-category="INFO">
          <a href="template.html" class="news__link">
            <time class="news__date" datetime="2026-02-01">2026.02.01</time>
            <span class="news__tag">INFO</span>
            <span class="news__title">キャスト発表（ダミー）</span>
          </a>
        </li>
        <li class="news__item" data-category="EVENT">
          <a href="template.html" class="news__link">
            <time class="news__date" datetime="2026-01-10">2026.01.10</time>
            <span class="news__tag">EVENT</span>
            <span class="news__title">制作発表会のお知らせ（ダミー）</span>
          </a>
        </li>
      </ul>

      <div style="text-align:center; padding: 3rem 0;">
        <a href="../index.html" class="btn-outline">TOPに戻る</a>
      </div>
    </div>
  </main>

  <!-- フッター -->
  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__logo serif">Last Call</p>
      <p class="footer__copy">&copy;2026 YOLO / Last Call 製作委員会</p>
    </div>
  </footer>

  <script>
    // カテゴリフィルター（vanilla JS）
    const filterBtns = document.querySelectorAll('.news-filter__btn');
    const newsItems  = document.querySelectorAll('.news__item[data-category]');

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const filter = btn.dataset.filter;
        newsItems.forEach(item => {
          item.style.display =
            filter === 'all' || item.dataset.category === filter
              ? '' : 'none';
        });
      });
    });
  </script>
</body>
</html>
